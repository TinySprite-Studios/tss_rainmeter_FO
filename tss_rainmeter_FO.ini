MouseOverAction=[!CommandMeasure MeasureMenu "HoverTab('SET',1)"][Play "#Key5#"]
MouseLeaveAction=[!CommandMeasure MeasureMenu "HoverTab('SET',0)"]

[MeterDivider]
Meter=Shape
Shape=Line 60,235,(#WORKAREAWIDTH#-100),235 | StrokeWidth 2 | StrokeColor #AccentColor#

[MeterRow1]
MeterStyle=StyleRow
Meter=String
Y=270
Text=#Row1Text#
Hidden=1
LeftMouseUpAction=[!CommandMeasure MeasureMenu "Click(1)"]
MouseOverAction=[!CommandMeasure MeasureMenu "HoverRow(1,1)"]
MouseLeaveAction=[!CommandMeasure MeasureMenu "HoverRow(1,0)"]
Group=Rows

[MeterRowDel1]
MeterStyle=StyleRowDel
Meter=String
Y=270
Text=#Row1DelText#
Hidden=1
LeftMouseUpAction=[!CommandMeasure MeasureMenu "Delete(1)"]
MouseOverAction=[!SetOption MeterRowDel1 FontColor 255,110,110,255]
MouseLeaveAction=[!SetOption MeterRowDel1 FontColor #DeleteColor#]
Group=DelRows


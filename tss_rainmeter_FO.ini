[Rainmeter]
Update=100
AccurateText=1
Draggable=0
DragMargins=0,0,0,0
OnRefreshAction=[!DisableDrag "#CURRENTCONFIG#"]
LeftMouseDownAction=[!DisableDrag "#CURRENTCONFIG#"]

[Metadata]
Name=B.O.L.T Bunker Operations & Logistics Terminal (Lua)
Author=Daniel2435 + TinySprite Studios
Information=Lua-driven Pip-Boy style terminal with tabs and dynamic menus
Version=3.0.0

[Variables]
@Include=#@#Variables.inc
MenuConfig=#@#Config\Config.lua
UserItemsConfig=#@#Config\UserItems.lua
UserItemsPendingConfig=#@#Config\UserItems.pending.lua
NetworkTestPendingConfig=#@#Config\NetworkTest.pending.lua
StatusText=STAT // SYSTEM STATUS ONLINE

[MeasureDate]
Measure=Time
Format=%a %d %b %Y  %H:%M

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureCPUClamped]
Measure=Calc
Formula=Clamp(Round([MeasureCPU],0),0,99)
DynamicVariables=1

[MeasureRAMUsed]
Measure=PhysicalMemory

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1

[MeasureRAMPct]
Measure=Calc
Formula=([MeasureRAMUsed]/Max([MeasureRAMTotal],1))*100
DynamicVariables=1

[MeasureRAMClamped]
Measure=Calc
Formula=Clamp(Round([MeasureRAMPct],0),0,99)
DynamicVariables=1

[MeasureDiskCFree]
Measure=FreeDiskSpace
Drive=C:
UpdateDivider=10

[MeasureDiskCTotal]
Measure=FreeDiskSpace
Drive=C:
Total=1
UpdateDivider=10

[MeasureDiskCUsed]
Measure=Calc
Formula=(1-([MeasureDiskCFree]/[MeasureDiskCTotal]))*100
DynamicVariables=1

[MeasureDiskCUsedClamped]
Measure=Calc
Formula=Clamp(Round([MeasureDiskCUsed],0),0,99)
DynamicVariables=1

[MeasureDiskGFree]
Measure=FreeDiskSpace
Drive=G:
UpdateDivider=10

[MeasureDiskGTotal]
Measure=FreeDiskSpace
Drive=G:
Total=1
UpdateDivider=10

[MeasureDiskGUsed]
Measure=Calc
Formula=(1-([MeasureDiskGFree]/[MeasureDiskGTotal]))*100
DynamicVariables=1

[MeasureDiskGUsedClamped]
Measure=Calc
Formula=Clamp(Round([MeasureDiskGUsed],0),0,99)
DynamicVariables=1

[MeasureNetIn]
Measure=NetIn
Interface=#NetworkInterface#
DynamicVariables=1

[MeasureNetOut]
Measure=NetOut
Interface=#NetworkInterface#
DynamicVariables=1

[MeasureUptimeSeconds]
Measure=Uptime
UpdateDivider=10
DynamicVariables=1

[MeasureUptimeText]
Measure=String
String=#UptimeText#
DynamicVariables=1

[MeasureNetTestDownText]
Measure=String
String=#NetTestDown#
DynamicVariables=1

[MeasureNetTestUpText]
Measure=String
String=#NetTestUp#
DynamicVariables=1

[MeasureMenu]
Measure=Script
ScriptFile=#@#Scripts\PipBoyMenu.lua
DynamicVariables=1

[MeasureEditNameInput]
Measure=Plugin
Plugin=InputText
SolidColor=0,0,0,220
FontColor=#TextColor#
FontFace=#FontFace#
FontSize=20
X=(#WORKAREAWIDTH#/2-300)
Y=(#WORKAREAHEIGHT#/2-20)
W=600
H=40
DefaultValue=
FocusDismiss=1
Command1=[!SetVariable TempEmployeeName "$UserInput$"][!CommandMeasure MeasureMenu "ApplyDisplayNameFromVar()"]
DynamicVariables=1
[StyleTab]
Meter=String
Y=185
W=220
H=45
SolidColor=0,0,0,1
FontSize=28
FontColor=#TextColor#
FontFace=#FontFace#
StringAlign=CenterCenter
AntiAlias=1
DynamicVariables=1

[StyleRow]
Meter=String
X=60
W=(#WORKAREAWIDTH#-120)
H=40
SolidColor=0,0,0,1
FontSize=25
FontColor=#TextColor#
FontFace=#FontFace#
StringAlign=LeftCenter
AntiAlias=1
ClipString=1
InlinePattern=\[DEL\]
InlineSetting=Color | #DeleteColor#
DynamicVariables=1

[StyleRowDel]
Meter=String
X=95
W=90
H=40
SolidColor=0,0,0,1
FontSize=22
FontColor=#DeleteColor#
FontFace=#FontFace#
StringAlign=LeftCenter
AntiAlias=1
DynamicVariables=1

[MeterTitle]
Meter=String
X=60
Y=45
W=(#WORKAREAWIDTH#-120)
H=78
SolidColor=0,0,0,1
FontSize=31
FontColor=#TextColor#
FontFace=#FontFace#
StringAlign=Left
AntiAlias=1
Text=#TitleLine1##CRLF##TitleLine2#
DynamicVariables=1

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=(#WORKAREAWIDTH#-100)
Y=52
W=520
H=28
SolidColor=0,0,0,1
FontSize=18
FontColor=#TextColor#
FontFace=#FontFace#
StringAlign=RightTop
AntiAlias=1
Text=%1
DynamicVariables=1

[MeterTabSTAT]
MeterStyle=StyleTab
Meter=String
X=160
Text=STAT
LeftMouseUpAction=[!CommandMeasure MeasureMenu "SetTab('STAT')"]
MouseOverAction=[!CommandMeasure MeasureMenu "HoverTab('STAT',1)"][Play "#Key1#"]
MouseLeaveAction=[!CommandMeasure MeasureMenu "HoverTab('STAT',0)"]

[MeterTabDATA]
MeterStyle=StyleTab
Meter=String
X=400
Text=DATA
LeftMouseUpAction=[!CommandMeasure MeasureMenu "SetTab('DATA')"]
MouseOverAction=[!CommandMeasure MeasureMenu "HoverTab('DATA',1)"][Play "#Key2#"]
MouseLeaveAction=[!CommandMeasure MeasureMenu "HoverTab('DATA',0)"]

[MeterTabINV]
MeterStyle=StyleTab
Meter=String
X=640
Text=INV
LeftMouseUpAction=[!CommandMeasure MeasureMenu "SetTab('INV')"]
MouseOverAction=[!CommandMeasure MeasureMenu "HoverTab('INV',1)"][Play "#Key3#"]
MouseLeaveAction=[!CommandMeasure MeasureMenu "HoverTab('INV',0)"]

[MeterTabRADIO]
MeterStyle=StyleTab
Meter=String
X=880
Text=RADIO
LeftMouseUpAction=[!CommandMeasure MeasureMenu "SetTab('RADIO')"]
MouseOverAction=[!CommandMeasure MeasureMenu "HoverTab('RADIO',1)"][Play "#Key4#"]
MouseLeaveAction=[!CommandMeasure MeasureMenu "HoverTab('RADIO',0)"]

[MeterTabSET]
